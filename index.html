<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    video {
      margin-top: 20px;
      max-width: 100%;
    }

    #log {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="log">Loading...</div>

  <video id="video" controls autoplay></video>

  <script>
    const log = document.getElementById('log');
    const video = document.getElementById('video');

    async function start() {
      const infoResponse = await fetch('./info.json');

      if (!infoResponse.ok) {
        log.textContent = 'Missing info.json';
        return;
      }

      const info = await infoResponse.json();

      const buffers = [];

      for (let i = 0; i < info.totalChunks; i++) {
        const filename = `part${String(i).padStart(4, '0')}.txt`;

        log.textContent = `Downloading ${filename}...`;

        const response = await fetch('./' + filename);

        if (!response.ok) {
          log.textContent = `Missing ${filename}`;
          return;
        }

        buffers.push(await response.arrayBuffer());
      }

      log.textContent = 'Assembling...';

      const blob = new Blob(buffers, {
        type: info.mimeType || 'video/mp4'
      });

      const url = URL.createObjectURL(blob);

      video.src = url;

      await video.play().catch(() => {});

      log.textContent = 'Loaded.';
    }

    start();
  </script>
</body>
</html>
